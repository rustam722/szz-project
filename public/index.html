<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СЗЗ Инструмент</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/pdf-editor.css">
</head>
<body>

<!-- ══ ОСНОВНОЙ ИНТЕРФЕЙС ══ -->
<div id="app">

  <!-- Топ-бар -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="tb-logo">🗺</div>
      <span class="tb-title">СЗЗ Инструмент</span>
    </div>
    <div class="topbar-center">
      <button class="tb-btn" onclick="openProjects()">📁 Проекты</button>
      <span class="tb-project-name" id="tb-project-name">Новый проект</span>
      <button class="tb-btn" onclick="saveProject()">💾 Сохранить</button>
    </div>
    <div class="topbar-right"></div>
  </div>

  <!-- Основной контент -->
  <div class="app-body">

    <!-- ── ЛЕВАЯ ПАНЕЛЬ ── -->
    <div class="sidebar" id="sidebar">

      <!-- Инструменты -->
      <div class="params">
        <div class="tool-btns">
          <button class="tbtn active" id="t-poly"   onclick="setTool('poly')">✏ Полигон</button>
          <button class="tbtn"        id="t-coords" onclick="setTool('coords')">📍 Координаты</button>
        </div>
        <div id="params-poly">
          <div class="hint">Кликай на карту. Двойной клик — завершить.</div>
          <div class="prow">
            <button class="btn" onclick="closePoly()" id="btn-close-poly" disabled>✓ Замкнуть</button>
            <button class="btn warn" onclick="undoPolyPt()">↩ Отменить</button>
          </div>
        </div>
        <div id="params-coords" style="display:none">
          <textarea id="coords-input" placeholder="59.123456, 39.654321&#10;59.124000, 39.655000&#10;..."></textarea>
          <button class="btn" onclick="buildFromCoords()">✓ Построить</button>
        </div>
      </div>

      <!-- Параметры СЗЗ -->
      <div class="params">
        <div class="prow"><span class="plabel">Буфер СЗЗ (м)</span>
          <input type="number" id="szz-buffer-m" value="1000" min="10" max="50000">
        </div>
        <div class="prow"><span class="plabel">Тип линии</span>
          <select id="szz-line-type">
            <option value="solid">Сплошная</option>
            <option value="dashed" selected>Пунктир</option>
            <option value="dotted">Точки</option>
          </select>
        </div>
        <div class="prow"><span class="plabel">Толщина СЗЗ</span>
          <input type="number" id="szz-line-width" value="3" min="1" max="12">
        </div>
        <div class="prow"><span class="plabel">Толщина ЗУ</span>
          <input type="number" id="parcel-line-width" value="2" min="1" max="12">
        </div>
        <button class="btn pri" id="btn-gen-szz" onclick="generateSzz()" disabled>⊙ Построить СЗЗ</button>
      </div>

      <!-- Слои -->
      <div class="params">
        <div class="prow" style="justify-content:space-between;margin-bottom:4px">
          <span style="font-weight:600;color:var(--tx)">Слои</span>
          <button class="btn warn" style="width:auto;padding:3px 8px;font-size:10px;min-height:0" onclick="clearAll()">✕ Очистить</button>
        </div>
        <div class="layer-box" id="layer-box">
          <div class="empty">Нет слоёв</div>
        </div>
      </div>

      <!-- Стиль слоя -->
      <div id="layer-props-panel" style="display:none" class="params layer-props">
        <div class="layer-props-title">⚙ Стиль: <span id="layer-props-name"></span></div>
        <div class="lp-row">
          <span class="lp-lbl">Заливка</span>
          <input type="range" id="lp-fill-opacity" min="0" max="100" value="15" oninput="applyLayerProps()">
          <span class="lp-val" id="lp-fill-val">15%</span>
          <input type="color" class="lp-color" id="lp-fill-color" value="#f59e0b" oninput="applyLayerProps()">
        </div>
        <div class="lp-row">
          <span class="lp-lbl">Обводка</span>
          <input type="range" id="lp-stroke-opacity" min="0" max="100" value="100" oninput="applyLayerProps()">
          <span class="lp-val" id="lp-stroke-val">100%</span>
          <input type="color" class="lp-color" id="lp-stroke-color" value="#f59e0b" oninput="applyLayerProps()">
        </div>
        <div class="lp-row">
          <span class="lp-lbl">Толщина</span>
          <input type="range" id="lp-weight" min="1" max="12" value="2" oninput="applyLayerProps()">
          <span class="lp-val" id="lp-weight-val">2px</span>
        </div>
        <div class="lp-row">
          <span class="lp-lbl">Линия</span>
          <select id="lp-dash" onchange="applyLayerProps()">
            <option value="">Сплошная</option>
            <option value="8,5">Пунктир</option>
            <option value="2,6">Точки</option>
            <option value="12,4,2,4">Штрих-пунктир</option>
          </select>
        </div>
      </div>

      <!-- Поиск -->
      <div class="params">
        <div class="prow" style="margin-bottom:6px">
          <div class="proxy-dot" id="proxy-dot"></div>
          <span id="proxy-label" style="font-size:11px;color:var(--tx2)">Проверка...</span>
          <button class="btn" style="width:auto;padding:3px 8px;font-size:10px;min-height:0;margin-left:auto" onclick="checkProxy()">↻</button>
        </div>
        <button class="btn pri" id="btn-search" onclick="searchParcels()" disabled>🔍 Найти ЗУ в СЗЗ</button>
        <div class="progress-bar" id="progress-bar" style="display:none">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <!-- Результаты -->
      <div class="params" style="flex:1;display:flex;flex-direction:column;min-height:0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;font-weight:600;color:var(--tx)">Найдено: <span id="res-cnt" style="color:var(--acc2)">0</span> ЗУ</span>
        </div>
        <div class="res-list" id="res-list">
          <div class="empty">📍 Найденные участки появятся здесь</div>
        </div>
        <div style="display:flex;gap:5px;margin-top:6px">
          <button class="btn" id="btn-export" onclick="exportCSV()" disabled style="flex:1">⬇ CSV</button>
          <button class="btn" id="btn-export-word" onclick="exportWord()" disabled style="flex:1;border-color:#166534;color:#4ade80">⬇ Word</button>
        </div>
        <button class="btn" onclick="enterPdfMode()" style="margin-top:5px;border-color:#6366f1;color:#a5b4fc;background:#1e1b4b">📄 Карта PDF</button>
      </div>

      <div class="status-bar" id="status-bar">Готово</div>
    </div>

    <!-- Разделитель ресайза -->
    <div id="main-resize-handle" title="Потяни чтобы изменить ширину панели"></div>

    <!-- ── КАРТА ── -->
    <div class="map-wrap">
      <div id="map-wrapper">
        <div id="map"></div>
        <div class="zoom-rect-overlay" id="zoom-rect-overlay"></div>
      </div>
      <div class="parcel-nav" id="parcel-nav">
        <span style="font-size:11px;color:var(--tx2)">📍</span>
        <select id="parcel-nav-select" onchange="navToParcel(this.value)">
          <option value="">— выбрать —</option>
        </select>
        <button class="parcel-nav-btn" onclick="document.getElementById('parcel-nav').style.display='none'">✕</button>
      </div>
      <div class="map-ctrl">
        <button class="mbtn" onclick="fitActive()" title="К слою">⊡</button>
        <button class="mbtn" id="sat-btn" onclick="toggleSat()" title="Подложка">🛰</button>
        <button class="mbtn" id="zoom-rect-btn" onclick="toggleZoomRect()" title="Зум">⬚</button>
        <button class="mbtn" id="parcel-nav-btn" onclick="openParcelNav()" title="Навигация">📍</button>
      </div>
    </div>

  </div><!-- /app-body -->
</div><!-- /app -->

<!-- ══ PDF РЕДАКТОР ══ -->
<div id="pdf-editor" style="display:none">
  <div id="pdf-canvas-wrap">
    <div id="pdf-canvas" tabindex="0"></div>
  </div>
  <div id="pdf-resize-handle" title="Потяни чтобы изменить ширину панели"></div>
  <div id="pdf-sidebar">
    <div id="pdf-sidebar-header">
      <button class="pdf-back-btn" onclick="exitPdfMode()">← Карта</button>
      <div style="display:flex;gap:4px;flex:1;justify-content:flex-end">
        <button class="pdf-back-btn" style="border-color:#1d4ed8;color:#60a5fa;background:#0f172a" onclick="renderPdf()" title="Сохранить PDF">💾 PDF</button>
        <button class="pdf-back-btn" style="border-color:#166534;color:#4ade80;background:#052e16" onclick="exportPng()" title="Сохранить PNG">🖼 PNG</button>
      </div>
    </div>
    <div id="pdf-toolbar"></div>
    <div id="pdf-props-panel"></div>
    <div id="pdf-layers-panel"></div>
    <div id="pdf-actions"></div>
  </div>
</div>

<!-- ══ МОДАЛ ПРОЕКТОВ ══ -->
<div id="projects-modal" style="display:none">
  <div class="modal-bg" onclick="closeProjects()"></div>
  <div class="modal">
    <div class="modal-hdr">
      <h2>📁 Проекты</h2>
      <button class="modal-close" onclick="closeProjects()">✕</button>
    </div>
    <div class="modal-body">
      <button class="btn pri" style="margin-bottom:12px" onclick="newProject()">＋ Новый проект</button>
      <div id="projects-list"><div class="empty">Нет сохранённых проектов</div></div>
    </div>
  </div>
</div>

<input type="file" id="ps-image-upload" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
<input type="file" id="logo-upload-input" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">

<!-- ══ ПРОЕКТЫ через localStorage ══ -->
<script>
  let currentProjectId = null;

  // ── ПРОЕКТЫ ──────────────────────────────────
  function _getProjects() {
    try { return JSON.parse(localStorage.getItem('szz_projects') || '[]'); } catch(e) { return []; }
  }
  function _saveProjects(list) {
    try { localStorage.setItem('szz_projects', JSON.stringify(list)); } catch(e) {}
  }

  window.openProjects = () => {
    document.getElementById('projects-modal').style.display = 'flex';
    _renderProjectsList();
  };
  window.closeProjects = () => {
    document.getElementById('projects-modal').style.display = 'none';
  };

  function _renderProjectsList() {
    const list = document.getElementById('projects-list');
    const projects = _getProjects();
    if (!projects.length) {
      list.innerHTML = '<div class="empty">Нет сохранённых проектов</div>';
      return;
    }
    list.innerHTML = projects.slice().reverse().map(p => `
      <div class="project-card">
        <div class="project-card-info">
          <div class="project-card-name">${p.name || 'Без названия'}</div>
          <div class="project-card-meta">${p.layerCount || 0} слоёв · ${p.parcelCount || 0} ЗУ · ${p.updatedAt ? new Date(p.updatedAt).toLocaleString('ru-RU') : ''}</div>
        </div>
        <div class="project-card-actions">
          <button class="btn" style="width:auto;padding:4px 10px" onclick="loadProject('${p.id}')">Открыть</button>
          <button class="btn warn" style="width:auto;padding:4px 8px" onclick="deleteProject('${p.id}')">🗑</button>
        </div>
      </div>`).join('');
  }

  window.newProject = () => {
    currentProjectId = null;
    clearAll();
    // Сбрасываем PDF-объекты и состояние карты PDF
    if (typeof pdfObjects !== 'undefined') {
      pdfObjects = [];
      Store.del('pdfObjects');
      Store.del('pdfOrientation');
    }
    document.getElementById('tb-project-name').textContent = 'Новый проект';
    closeProjects();
    setSt('Новый проект создан', 'ok');
  };

  window.saveProject = () => {
    const curName = document.getElementById('tb-project-name').textContent;
    const name = prompt('Название проекта:', curName === 'Новый проект' ? '' : curName);
    if (name === null) return;

    const layers = mapLayers.map(l => ({
      id: l.id, type: l.type, name: l.name, poly: l.poly,
      visible: l.visible, color: l.color, _psStyle: l._psStyle || null,
    }));
    const pdfObjs = pdfObjects.map(o => ({ ...o, data: { ...o.data, imgSrc: '' } }));

    const projects = _getProjects();
    const projectId = currentProjectId || 'proj_' + Date.now();
    const idx = projects.findIndex(p => p.id === projectId);
    const record = {
      id: projectId,
      name: name || 'Без названия',
      layers,
      pdfObjects: pdfObjs,
      pdfOrientation,
      foundParcels: foundParcels.slice(0, 300),
      layerCount: layers.length,
      parcelCount: foundParcels.length,
      updatedAt: Date.now(),
    };
    if (idx > -1) projects[idx] = record;
    else projects.push(record);
    _saveProjects(projects);

    currentProjectId = projectId;
    document.getElementById('tb-project-name').textContent = name || 'Без названия';
    setSt('Проект сохранён ✓', 'ok');
  };

  window.loadProject = (id) => {
    const projects = _getProjects();
    const p = projects.find(x => x.id === id);
    if (!p) { setSt('Проект не найден', 'err'); return; }
    closeProjects();
    clearAll();
    currentProjectId = id;
    document.getElementById('tb-project-name').textContent = p.name || 'Без названия';

    (p.layers || []).forEach(l => {
      const ll = l.poly.map(pt => L.latLng(pt[0], pt[1]));
      const style = l._psStyle || (l.type === 'szz'
        ? { color: l.color, fillColor: l.color, fillOpacity: 0.1, weight: 2, dashArray: '8,5' }
        : { color: l.color, fillColor: l.color, fillOpacity: 0.15, weight: 2 });
      const layer = L.polygon(ll, style).addTo(map);
      mapLayers.push({ id: l.id, type: l.type, name: l.name, poly: l.poly,
                       visible: l.visible, color: l.color, _psStyle: l._psStyle, layer });
      if (!l.visible) map.removeLayer(layer);
    });

    foundParcels = p.foundParcels || [];
    const inside = foundParcels.filter(fp => fp.inP);
    const cross  = foundParcels.filter(fp => !fp.inP);
    foundParcels.forEach(fp => addParcelLayer(fp));
    if (foundParcels.length) renderResults(inside, cross);

    // Загружаем PDF-объекты и сохраняем их в Store,
    // чтобы enterPdfMode() → _loadState() прочитал правильные данные
    pdfObjects = p.pdfObjects || [];
    pdfOrientation = p.pdfOrientation || 'landscape';
    Store.set('pdfObjects', pdfObjects.map(o => ({ ...o, data: { ...o.data, imgSrc: '' } })));
    Store.set('pdfOrientation', pdfOrientation);

    if (mapLayers.length) {
      const allBounds = mapLayers.filter(l => l.layer && l.layer.getBounds).map(l => l.layer.getBounds());
      if (allBounds.length) {
        const combined = allBounds.reduce((b, bb) => b.extend(bb));
        map.fitBounds(combined, { padding: [30, 30] });
      }
    }

    renderLayers(); updateButtons();
    document.getElementById('btn-export').disabled      = !foundParcels.length;
    document.getElementById('btn-export-word').disabled = !foundParcels.length;
    document.getElementById('res-cnt').textContent      = inside.length;
    setSt(`Проект «${p.name}» загружен`, 'ok');
  };

  window.deleteProject = (id) => {
    if (!confirm('Удалить проект?')) return;
    const projects = _getProjects().filter(p => p.id !== id);
    _saveProjects(projects);
    _renderProjectsList();
  };

  window._getCurrentUser = () => null;
</script>

<!-- ══ ОСНОВНЫЕ СКРИПТЫ ══ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<script src="js/utils.js"></script>
<script src="js/map.js"></script>
<script src="js/search.js"></script>
<script src="js/pdf-editor.js"></script>
<script src="js/export.js"></script>
<script src="js/main.js"></script>
</body>
</html>
